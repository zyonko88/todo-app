<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --danger: #ef4444;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --todo-bg: #f9fafb;
      --doing-bg: #eff6ff;
      --doing-border: #bfdbfe;
      --done-bg: #f0fdf4;
      --done-border: #bbf7d0;
    }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--primary); }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* --- フィルター --- */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* --- タスクカード --- */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--card);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-card[data-status="着手中"] { background: var(--doing-bg); border-color: var(--doing-border); }
    .task-card[data-status="完了"]   { background: var(--done-bg);  border-color: var(--done-border); opacity: 0.75; }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 0.97rem;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.4;
    }

    .task-card[data-status="完了"] .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-status {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .badge-todo   { background: #f3f4f6; color: #6b7280; }
    .badge-doing  { background: #dbeafe; color: #1d4ed8; }
    .badge-done   { background: #dcfce7; color: #15803d; }

    .task-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

    .btn-action {
      border: none;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn-action:active { opacity: 0.7; }

    .btn-next   { background: #dbeafe; color: #1d4ed8; }
    .btn-done   { background: #dcfce7; color: #15803d; }
    .btn-delete { background: #fee2e2; color: #b91c1c; }

    /* 完了タスクは次へボタン非表示 */
    .task-card[data-status="完了"] .btn-next,
    .task-card[data-status="完了"] .btn-done { display: none; }
    .task-card[data-status="着手中"] .btn-next { display: none; }
    .task-card[data-status="未着手"] .btn-done { display: none; }

    /* --- 空状態 --- */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-icon { font-size: 2.8rem; margin-bottom: 10px; }

    /* --- 追加ボタン（FAB） --- */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59,130,246,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
      z-index: 20;
    }

    .fab:active { background: var(--primary-dark); transform: scale(0.94); }

    /* --- モーダル --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 30;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 600px;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .modal input[type="text"], .modal select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }

    .modal input[type="text"]:focus,
    .modal select:focus { border-color: var(--primary); }

    .modal-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
    }

    .btn-submit {
      flex: 2;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-submit:active { background: var(--primary-dark); }
  </style>
</head>
<body>

<header>
  <h1>My <span>TODO</span></h1>
</header>

<div class="container">
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">すべて</button>
    <button class="tab" data-filter="未着手">未着手</button>
    <button class="tab" data-filter="着手中">着手中</button>
    <button class="tab" data-filter="完了">完了</button>
  </div>

  <div class="task-list" id="task-list"></div>
</div>

<button class="fab" id="open-modal" aria-label="タスクを追加">＋</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>タスクを追加</h2>
    <label for="task-name">タスク名</label>
    <input type="text" id="task-name" placeholder="タスク名を入力" autocomplete="off" />
    <label for="task-status-select">状態</label>
    <select id="task-status-select">
      <option value="未着手">未着手</option>
      <option value="着手中">着手中</option>
      <option value="完了">完了</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" id="close-modal">キャンセル</button>
      <button class="btn-submit" id="submit-task">追加する</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'my-todos-v2';
  const SEED = [
    { id: 1, name: '給与計算',          status: '未着手' },
    { id: 2, name: '会計事務所へ提出',  status: '未着手' },
    { id: 3, name: '佐藤先生へメール',  status: '未着手' },
    { id: 4, name: '支払法人メール',    status: '未着手' },
  ];
  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (!tasks) { tasks = SEED; save(); }
  let filter = 'all';

  const listEl    = document.getElementById('task-list');
  const overlay   = document.getElementById('modal-overlay');
  const nameInput = document.getElementById('task-name');
  const statusSel = document.getElementById('task-status-select');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  const BADGE = { '未着手': 'badge-todo', '着手中': 'badge-doing', '完了': 'badge-done' };

  function render() {
    const visible = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);

    if (!visible.length) {
      listEl.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          タスクはありません
        </div>`;
      return;
    }

    listEl.innerHTML = '';
    visible.forEach(task => {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.dataset.status = task.status;
      card.innerHTML = `
        <div class="task-body">
          <div class="task-title">${esc(task.name)}</div>
          <span class="task-status ${BADGE[task.status]}">${task.status}</span>
        </div>
        <div class="task-actions">
          <button class="btn-action btn-next"  data-id="${task.id}">着手中へ</button>
          <button class="btn-action btn-done"  data-id="${task.id}">完了にする</button>
          <button class="btn-action btn-delete" data-id="${task.id}">削除</button>
        </div>`;
      listEl.appendChild(card);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // イベント委譲
  listEl.addEventListener('click', e => {
    const btn = e.target.closest('.btn-action');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    if (btn.classList.contains('btn-next'))   { task.status = '着手中'; save(); render(); }
    if (btn.classList.contains('btn-done'))   { task.status = '完了';   save(); render(); }
    if (btn.classList.contains('btn-delete')) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }
  });

  // フィルター
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      filter = tab.dataset.filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      render();
    });
  });

  // モーダル開閉
  document.getElementById('open-modal').addEventListener('click', () => {
    nameInput.value = '';
    statusSel.value = '未着手';
    overlay.classList.add('open');
    setTimeout(() => nameInput.focus(), 200);
  });

  function closeModal() { overlay.classList.remove('open'); }
  document.getElementById('close-modal').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  // 追加
  document.getElementById('submit-task').addEventListener('click', addTask);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    tasks.unshift({ id: Date.now(), name, status: statusSel.value });
    save();
    render();
    closeModal();
  }

  render();
</script>
</body>
</html>
